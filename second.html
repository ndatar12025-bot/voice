<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Art Experience</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

color:white;
font-size:48px;
text-align:center;

transition:background 0.1s;

}

/* glowing text */

#text{

z-index:2;
animation:glow 1s infinite alternate;

}

@keyframes glow{

from{
text-shadow:0 0 10px white;
}

to{
text-shadow:0 0 40px white,0 0 60px white;
}

}

canvas{

position:absolute;
top:0;
left:0;

}

</style>

</head>

<body>

<div id="text">You Discovered The Hidden Art</div>

<audio id="music" autoplay loop preload="auto">
<source src="https://ndatar12025-bot.github.io/voice/audio.mp3" type="audio/mpeg">
  
</audio>

<canvas id="canvas"></canvas>

<script>

/* play audio when page loads */

const music = document.getElementById("music")
  const music = document.getElementById("music")



/* RANDOM BACKGROUND COLORS */

function changeColor(){

let r=Math.floor(Math.random()*255)
let g=Math.floor(Math.random()*255)
let b=Math.floor(Math.random()*255)

document.body.style.background="rgb("+r+","+g+","+b+")"

}

setInterval(changeColor,120)

/* PARTICLE ANIMATION */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speedX:(Math.random()-0.5)*1,
speedY:(Math.random()-0.5)*1
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.x+=p.speedX
p.y+=p.speedY

if(p.x<0||p.x>canvas.width) p.speedX*=-1
if(p.y<0||p.y>canvas.height) p.speedY*=-1

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
